  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Famous Dave's - Ordering<\u002Ftitle>\n    <style>\n        /* CSS Reset & Variables */\n        :root {\n            --primary-dark-green: #0a4f2a;\n            --primary-green: #0d6335;\n            --primary-yellow: #ffc20e;\n            --bg-color: #f7f7f7;\n            --white: #ffffff;\n            --text-dark: #191919;\n            --text-gray: #5e5e5e;\n            --text-light-gray: #8a8a8a;\n            --border-color: #e2e2e2;\n            --tag-bg: #e6f3eb;\n            --tag-text: #2e8b57;\n            --sold-out-bg: #e2e2e2;\n            --sold-out-text: #8a8a8a;\n            --font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n        }\n\n        * {\n            box-sizing: border-box;\n            margin: 0;\n            padding: 0;\n        }\n\n        body {\n            font-family: var(--font-family);\n            background-color: var(--bg-color);\n            color: var(--text-dark);\n            -webkit-font-smoothing: antialiased;\n        }\n\n        button {\n            cursor: pointer;\n            border: none;\n            background: none;\n            font-family: inherit;\n        }\n\n        input {\n            font-family: inherit;\n        }\n\n        /* Top Header */\n        .top-header {\n            background-color: var(--primary-dark-green);\n            color: var(--white);\n            display: flex;\n            align-items: center;\n            height: 60px;\n            padding: 0 20px;\n            justify-content: space-between;\n        }\n\n        .header-left {\n            display: flex;\n            align-items: center;\n            height: 100%;\n        }\n\n        .logo-container {\n            display: flex;\n            align-items: center;\n            font-size: 20px;\n            font-weight: bold;\n            margin-right: 30px;\n        }\n        \n        .logo-circle {\n            background-color: #1a1a1a;\n            color: white;\n            border: 2px solid #b32025;\n            border-radius: 50%;\n            width: 30px;\n            height: 30px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 8px;\n            margin-right: 10px;\n            text-align: center;\n            line-height: 1;\n        }\n\n        .nav-links {\n            display: flex;\n            height: 100%;\n        }\n\n        .nav-link {\n            padding: 0 24px;\n            display: flex;\n            align-items: center;\n            font-weight: 600;\n            text-decoration: none;\n            color: var(--white);\n            height: 100%;\n        }\n\n        .nav-link.active {\n            background-color: var(--primary-yellow);\n            color: var(--text-dark);\n        }\n\n        .location-info {\n            display: flex;\n            align-items: center;\n            margin-left: 30px;\n            font-size: 14px;\n        }\n\n        .location-info svg {\n            margin-right: 8px;\n            fill: var(--primary-yellow);\n        }\n\n        .loc-details {\n            display: flex;\n            flex-direction: column;\n        }\n\n        .loc-status {\n            font-weight: 700;\n            font-size: 13px;\n        }\n        .loc-name {\n            font-size: 13px;\n            opacity: 0.9;\n        }\n\n        .header-right {\n            display: flex;\n            align-items: center;\n            gap: 16px;\n        }\n\n        .flag-icon {\n            width: 24px;\n            height: 24px;\n            background-color: #eee;\n            border-radius: 50%;\n            overflow: hidden;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 12px;\n        }\n\n        .sign-in-btn {\n            background-color: var(--white);\n            color: var(--text-dark);\n            padding: 8px 16px;\n            border-radius: 20px;\n            font-weight: 600;\n            font-size: 14px;\n        }\n\n        /* Sub Header */\n        .sub-header {\n            background-color: var(--white);\n            padding: 20px 40px;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            border-bottom: 1px solid var(--border-color);\n            position: sticky;\n            top: 0;\n            z-index: 10;\n        }\n\n        .store-title-area {\n            display: flex;\n            align-items: center;\n            gap: 12px;\n        }\n\n        .store-title {\n            font-size: 24px;\n            font-weight: 700;\n        }\n\n        .store-links {\n            color: var(--text-gray);\n            font-size: 14px;\n        }\n\n        .heart-btn {\n            color: var(--border-color);\n            display: flex;\n            align-items: center;\n        }\n        .heart-btn svg { width: 20px; height: 20px; fill: #d1d5db; }\n\n        .sub-header-actions {\n            display: flex;\n            align-items: center;\n            gap: 16px;\n        }\n\n        .search-bar {\n            display: flex;\n            align-items: center;\n            border: 1px solid var(--border-color);\n            border-radius: 20px;\n            padding: 8px 16px;\n            width: 250px;\n            background-color: var(--white);\n        }\n\n        .search-bar svg {\n            fill: var(--text-gray);\n            width: 16px; height: 16px;\n        }\n\n        .search-bar input {\n            border: none;\n            outline: none;\n            padding: 0 10px;\n            width: 100%;\n            font-size: 14px;\n        }\n\n        .search-bar .clear-search {\n            color: var(--text-gray);\n            font-size: 18p \n                    card.classList.add('active');\n                } else {\n                    card.classList.remove('active');\n                }\n            });\n            updateModalFooter();\n        };\n\n        window.togglePizzaBeverage = function(name, price) {\n            window.pizzaComboState.beverage = {name, price};\n            document.querySelectorAll('.pizza-beverage-card').forEach(card => {\n                const cardName = card.querySelector('.option-name').innerText;\n                if (window.pizzaComboState.beverage && window.pizzaComboState.beverage.name === cardName) {\n                    card.classList.add('active');\n                } else {\n                    card.classList.remove('active');\n                }\n            });\n            updateModalFooter();\n        };\n\n        window.selectPizzaSide = function(name, price) {\n            window.pizzaComboState.side = {name, price};\n            document.querySelectorAll('.pizza-side-card').forEach(card => {\n                const cardName = card.querySelector('.option-name').innerText;\n                if (window.pizzaComboState.side && window.pizzaComboState.side.name === cardName) {\n                    card.classList.add('active');\n                } else {\n                    card.classList.remove('active');\n                }\n            });\n            updateModalFooter();\n        };\n\n        window.togglePizzaDessert = function(name, price) {\n            const index = window.pizzaComboState.desserts.findIndex(d => d.name === name);\n            if (index > -1) {\n                window.pizzaComboState.desserts.splice(index, 1);\n            } else {\n                if (window.pizzaComboState.desserts.length >= 3) return; // Max 3 options\n                window.pizzaComboState.desserts.push({name, price});\n            }\n            \n            document.querySelectorAll('.pizza-dessert-card').forEach(card => {\n                const cardName = card.quer onsHTML = `\n                        <div class=\"inline-tile-options\">\n                            <div class=\"tile-option-card\" onclick=\"addToCartWithOptions(${product.id}, 0)\">\n                                <span class=\"option-name\">Personal<\u002Fspan>\n                                <span class=\"option-price\">$8.95<\u002Fspan>\n                            <\u002Fdiv>\n                            <div class=\"tile-option-card\" onclick=\"addToCartWithOptions(${product.id}, 1)\">\n                                <span class=\"option-name\">Medium<\u002Fspan>\n                                <span class=\"option-price\">$11.95<\u002Fspan>\n                            <\u002Fdiv>\n                            <div class=\"tile-option-card\" onclick=\"addToCartWithOptions(${product.id}, 2)\">\n                                <span class=\"option-name\">Large<\u002Fspan>\n                                <span class=\"option-price\">$14.45<\u002Fspan>\n                            <\u002Fdiv>\n                        <\u002Fdiv>\n                    `;\n                } else if (product.isSoldOut) {\n                    actionBtn = `<button class=\"sold-out-btn\" disabled>Sold Out<\u002Fbutton>`;\n                } else {\n                    actionBtn = `<button class=\"add-btn\" onclick=\"addToCart(${product.id})\">Add +<\u002Fbutton>`;\n                }\n\n                // Only render the price and standard action button row for items OTHER than Caj Biscuit Meal & 2Pc Dinner\n                if (product.name !== 'Caj Biscuit Meal' && product.name !== '2Pc Dinner' && product.name !== 'Classic Pizza Combo') {\n                    productBottomHTML = `\n                        <div class=\"product-bottom\">\n                            <div class=\"product-price\">${priceFormatted}<\u002Fdiv>\n                            ${actionBtn}\n                        <\u002Fdiv>\n                    `;\n                }\n\n                const cardHTML = `\n rrentCustomizations.drinkAddons.splice(index, 1);\n            } else {\n                currentCustomizations.drinkAddons = [addon]; // Limit to Max 1 selection\n            }\n            \n            // Auto-collapse removed so user can manually toggle using the pill arrow\n            \n            updateDrinkAddonsUI();\n            calculateCustomTotalPrice();\n            checkDrinkAddonsVisibility(); \n        };\n\n        window.toggleNestedAddons = function() {\n            isDrinkAddonsCollapsed = !isDrinkAddonsCollapsed;\n            checkDrinkAddonsVisibility();\n        };\n\n        window.updateDrinkAddonsUI = function() {\n            const options = document.querySelectorAll('#drinkAddonsGroupBlock .drink-addon-card');\n            options.forEach(opt => {\n                const title = opt.querySelector('.custom-item-name').innerText;\n                if (currentCustomizations.drinkAddons.includes(title)) {\n                    opt.classList.add('active');\n                } else {\n                    opt.classList.remove('active');\n                }\n            });\n        };\n\n        window.checkDrinkAddonsVisibility = function() {\n            const addonBlock = document.getElementById('drinkAddonsGroupBlock');\n            const contentBox = document.getElementById('drinkAddonsContentBox');\n            const toggleIcon = document.getElementById('drinkAddonToggleIcon');\n            const parentTextSpan = document.getElementById('drinkAddonParentText');\n            if (!addonBlock) return;\n            \n            const isBo1CajBiscuit = selectedOptionIndex === 2 && activeProduct && activeProduct.name === 'Caj Biscuit Meal';\n            const isMediumUnsweetTea = currentCustomizations.drink === 'Medium Unsweet Tea';\n            \n            // Strictly applicable to Bo1 > Caj Biscuit Meal > Medium Unsweet Tea\n            if (isBo1CajBiscuit && isMediumUnsweetTea) {\n                addonBlock.style.display = 'block';\n ptionUpcharge;\n\n            // Biscuit Mods cost $2.89 each\n            finalPrice += currentCustomizations.biscuitMods.length * 2.89;\n\n            // Meat Options cost $2.89 each (applies to both A La Carte and Combos now)\n            currentCustomizations.meat.forEach(meatName => {\n                const data = meatCustomizationData[meatName];\n                const qty = data ? data.qty : 1;\n                finalPrice += qty * 2.89;\n            });\n\n            if (selectedOptionIndex !== 0) {\n                // Regular Combo details calculations\n                const isBo2CajBiscuit = selectedOptionIndex === 3 && activeProduct && activeProduct.name === 'Caj Biscuit Meal';\n                const isRegComboCajBiscuit = selectedOptionIndex === 1 && activeProduct && activeProduct.name === 'Caj Biscuit Meal';\n\n                // Fixin upcharges\n                if (currentCustomizations.fixinSize === 'Medium') {\n                    finalPrice += (isBo2CajBiscuit || isRegComboCajBiscuit) ? 0.40 : 0.00;\n                }\n                else if (currentCustomizations.fixinSize === 'Family') {\n                    finalPrice += ((selectedOptionIndex >= 1 && selectedOptionIndex <= 3) && activeProduct && activeProduct.name === 'Caj Biscuit Meal') ? 1.90 : 2.50;\n                }\n\n                // Fixin 2 upcharges\n                if (isBo2CajBiscuit && currentCustomizations.fixin2) {\n                    if (currentCustomizations.fixin2Size === 'Medium') {\n                        finalPrice += 0.40;\n                    } else if (currentCustomizations.fixin2Size === 'Family') {\n                        finalPrice += 1.90; \n                    }\n                }\n\n                // Drink upcharges\n                if (currentCustomizations.drink) {\n                    if (currentCustomizations.drinkSize === 'Small') finalPrice -= 0.30;\n                    else if (currentCustomizations.drinkSize === 'Large') finalPrice += 0.00;\n                    else if (currentCustomizations.drinkSize === '1/2 Gal') {\n                        finalPrice += ((selectedOptionIndex >= 1 && selectedOptionIndex <= 3) && activeProduct && activeProduct.name === 'Caj Biscuit Meal') ? 1.90 : 2.20;\n                    }\n                    \n                    if (currentCustomizations.drinkAddons && currentCustomizations.drinkAddons.length > 0) {\n                        currentCustomizations.drinkAddons.forEach(addon => {\n                            if (addon === 'Add Lemon') finalPrice += 0.75;\n                            else if (addon === 'Extra Lemon') finalPrice += 0.50;\n                            else if (addon === 'Lime Flavor') finalPrice += 0.25;\n                            else if (addon === 'Peach Flavor') finalPrice += 1.00;\n                        });\n                    }\n                }\n            }\n\n            // Condiments are free\n            \n            const priceText = `$ ${finalPrice.toFixed(2)}`;\n            \n            // Sync with inline modal display just in case\n            updateModalFooter();\n\n            // Validation logic: Required fields satisfied\n            let missingReqs = 0;\n            const fixinReq = document.getElementById('fixinRequiredBadge');\n            const fixin2Req = document.getElementById('fixin2RequiredBadge');\n            const breadReq = document.getElementById('breadRequiredBadge');\n            \n            // Hide badges by default\n            if (fixinReq) fixinReq.style.display = 'none';\n            if (fixin2Req) fixin2Req.style.display = 'none';\n            if (breadReq) breadReq.style.display = 'none';\n\n            if (selectedOptionIndex === 0) {\n                if (!currentCustomizations.bread) {\n                    missingReqs++;\n                    if (breadReq) breadReq.style.display = 'inline-flex';\n                }\n            } else if (selectedOptionIndex === 3 && activeProduct && activeProduct.name === 'Caj Biscuit Meal') {\n                if (!currentCustomizations.fixin) {\n                    missingReqs++;\n                    if (fixinReq) fixinReq.style.display = 'inline-flex';\n                }\n                if (!currentCustomizations.fixin2) {\n                    missingReqs++;\n                    if (fixin2Req) fixin2Req.style.display = 'inline-flex';\n                }\n            } else {\n                if (!currentCustomizations.fixin) {\n                    missingReqs++;\n                    if (fixinReq) fixinReq.style.display = 'inline-flex';\n                }\n            }\n\n            if (missingReqs === 0) {\n                customActionBtn.classList.remove('disabled');\n                customActionBtn.disabled = false;\n                customActionBtn.innerHTML = `<span>Add to Order<\u002Fspan> <span>${priceText}<\u002Fspan>`;\n            } else {\n                customActionBtn.classList.add('disabled');\n                customActionBtn.disabled = true;\n                customActionBtn.innerHTML = `<span>Make ${missingReqs} Required Selection${missingReqs > 1 ? 's' : ''}<\u002Fspan> <span>${priceText}<\u002Fspan>`;\n            }\n        }\n\n        // Customization Cards Event Handlers\n        customItemCards.forEach(card => {\n            card.addEventListener('click', (event) => {\n                const group = card.getAttribute('data-group');\n                const name = card.getAttribute('data-name');\n\n                // Safety check: ignore cards without a data-group (e.g., steak prep options)\n                if (!group || currentCustomizations[group] === undefined) return;\n\n                if (group === 'bread') {\n                    // Bread option is single-select (Max: 1)\n                    currentCustomizations.bread = name;\n                    \n                    // Toggle Active Highlight strictly for this radio selection\n                    document.querySelectorAll('[data-group=\"bread\"]').forEach(c => rlay if user clicks its dark backdrop\n        document.getElementById('steakPrepModal').addEventListener('click', (e) => {\n            if (e.target === document.getElementById('steakPrepModal')) {\n                closeSteakPrepModal();\n            }\n        });\n\n        /* --- Meat Customize Sub-Popover Logic --- */\n        window.openMeatCustomize = function(event, buttonElement, meatName) {\n            // Stop propagation to avoid toggling card active state accidentally\n            event.stopPropagation();\n\n            currentCustomizedMeat = meatName;\n\n            // Retrieve or set default customization data\n            if (!meatCustomizationData[meatName]) {\n                meatCustomizationData[meatName] = { portion: '', qty: 1 };\n            }\n\n            const data = meatCustomizationData[meatName];\n\n            // Ensure card is selected/activated\n            const parentCard = buttonElement.closest('.custom-item-card');\n            const isCurrentlyActive = parentCard.classList.contains('active');\n            if (!isCurrentlyActive) {\n                parentCard.click();\n            }\n\n            // Sync Portion Radios\n            const radio = document.querySelector(`input[name=\"portion-group\"][value=\"${data.portion}\"]`);\n            if (radio) radio.checked = true;\n\n            // Retrieve popover and ensure it's displayed (but hidden) to accurately measure height/width\n            const popover = document.getElementById('meatPopover');\n            popover.style.visibility = 'hidden';\n            popover.style.display = 'flex';\n            \n            const popoverHeight = popover.offsetHeight;\n            const popoverWidth = popover.offsetWidth;\n\n            // Positioning Logic: Try to position perfectly ABOVE the meat item card\n            const btnRect = buttonElement.getBoundingClientRect();\n            \n            // Fixed positioning relative to the viewport. Center vertically next to button.\n            let topPos = btnRect.top + (btnRect.height / 2) - (popoverHeight / 2); \n            \n            // Align precisely centered left of the button to overlap item\n            let leftPos = btnRect.left - popoverWidth - 12;\n            \n            // If it spills off left edge, correct inwards\n            if (leftPos < 16) {\n                leftPos = 16;\n            }\n            // If it spills off the top edge of screen, place it below the card instead\n            if (topPos < 16) {\n                topPos = 16;\n            }\n\n            // Apply finalized fixed coordinates\n            popover.style.top = topPos + 'px';\n            popover.style.left = leftPos + 'px';\n            popover.style.visibility = 'visible';\n        };\n\n        window.closeMeatCustomize = function() {\n            const popover = document.getElementById('meatPopover');\n            if (popover) popover.style.display = 'none';\n            currentCustomizedMeat = null;\n        };\n\n        /* --- Sauce Customize Sub-Popover Logic --- */\n        window.currentCustomizedSauce = null;\n\n        window.openSauceCustomize = function(event, buttonElement, sauceName) {\n            event.stopPropagation();\n            window.currentCustomizedSauce = sauceName;\n\n            if (!window.pizzaComboState.sauceMods) window.pizzaComboState.sauceMods = {};\n\n            const parentCard = buttonElement.closest('.option-card');\n            if (!parentCard.classList.contains('active')) {\n                parentCard.click();\n            }\n\n            const mod = window.pizzaComboState.sauceMods[sauceName];\n            document.querySelectorAll('input[name=\"sauce-portion-group\"]').forEach(r => r.checked = false);\n            if (mod) {\n                const radio = document.querySelector(`input[name=\"sauce-portion-group\"][value=\"${mod}\"]`);\n                if (radio) radio.checked = true;\n            }\n\n            const popover = document.getElementById(' \n            if (!currentCustomizedMeat) return;\n            meatCustomizationData[currentCustomizedMeat].location = loc;\n            document.querySelectorAll('.loc-pill').forEach(pill => {\n                if (pill.getAttribute('data-loc') === loc) {\n                    pill.classList.add('active');\n                } else {\n                    pill.classList.remove('active');\n                }\n            });\n            calculateCustomTotalPrice();\n        };\n\n        window.selectMeatPortion = function(portion) {\n            if (!currentCustomizedMeat) return;\n            meatCustomizationData[currentCustomizedMeat].portion = portion;\n            calculateCustomTotalPrice();\n        };\n\n        window.adjustMeatQty = function(change) {\n            if (!currentCustomizedMeat) return;\n            let currentQty = meatCustomizationData[currentCustomizedMeat].qty;\n            currentQty += change;\n            if (currentQty < 1) currentQty = 1;\n            meatCustomizationData[currentCustomizedMeat].qty = currentQty;\n            document.getElementById('meatQtyVal').innerText = currentQty;\n            calculateCustomTotalPrice();\n        };\n\n        // Close Popover on Outside Click\n        document.addEventListener('click', (e) => {\n            const popover = document.getElementById('meatPopover');\n            if (popover && popover.style.display === 'flex') {\n                // Check if user clicked outside both the popover and the pill buttons\n                if (!popover.contains(e.target) && !e.target.classList.contains('customize-pill-btn') && !e.target.closest('.customize-pill-btn')) {\n                    closeMeatCustomize();\n                }\n            }\n        });\n\n        // Close Popover on Scroll to prevent it moving awkwardly with the screen\n        window.addEventListener('scroll', function(e) {\n            // Close as long as the popover itself isn't the thing being scrolled\n            if (e.target.id !== 'meatPopover' && !document.getElementById('meatPopover').contains(e.target)) {\n                closeMeatCustomize();\n            }\n        }, true); \n\n        // Save and Add Customization to Order\n        customActionBtn.addEventListener('click', () => {\n            if (!activeProduct) return;\n\n            let selectedMods = [];\n\n            // Add biscuitMods and condiments which are shared and always applicable\n            selectedMods.push(...currentCustomizations.biscuitMods);\n            selectedMods.push(...currentCustomizations.condiments);\n            \n            // Add Meat which is now shared across both types\n            const customizedMeatsList = currentCustomizations.meat.map(meatName => {\n                const isALaCarteCajBiscuit = selectedOptionIndex === 0 && activeProduct && activeProduct.name === 'Caj Biscuit Meal';\n                \n                // Overlay logic specifically for Steak\n                if (meatName === 'Steak' && isALaCarteCajBiscuit) {\n                    return `Steak (${currentCustomizations.steakPrep || 'Grilled'})`;\n                }\n                \n                const data = meatCustomizationData[meatName];\n                if (data && data.portion) {\n                    return `${meatName} (${data.portion})`;\n                }\n                const mod = currentCustomizations.meatModifier;\n                return mod ? `${meatName} (${mod})` : meatName;\n            });\n            selectedMods.push(...customizedMeatsList);\n\n            let totalModifierCost = currentCustomizations.biscuitMods.length * 2.89;\n            currentCustomizations.meat.forEach(meatName => {\n                const data = meatCustomizationData[meatName];\n                const qty = data ? data.qty : 1;\n                totalModifierCost += qty * 2.89;\n            });\n\n            if (selectedOptionIndex === 0) {\n                // A La Carte Specific modifications\n                if(currentCustomization nt');\n                if (content) content.appendChild(block);\n            }\n            return block;\n        };\n\n        window.initPizzaGroupState = function(product, preselectedIndex) {\n            const supremeDefaults = ['Pepperoni', 'Italian Sausage', 'Mushrooms', 'Onions', 'Green Peppers', 'Black Olives'];\n            window.pizzaGroupState = {\n                variationIndex: (preselectedIndex !== null && preselectedIndex !== undefined) ? preselectedIndex : null,\n                single: { crust: null, sauce: null, cheese: null, side: null, drink: null },\n                modifiers: { toppings: [], premium: [], sauceAddons: [] }\n            };\n            if (product.name === 'Supreme Pizza') {\n                window.pizzaGroupState.modifiers.toppings = supremeDefaults.slice();\n            }\n        };\n\n        window.pgDrinkSizeName = function() {\n            const s = window.pizzaGroupState;\n            if (!s || s.variationIndex === null) return 'Small';\n            return pizzaGroupConfig.variations[s.variationIndex].name;\n        };\n\n        function pgPriceTag(price) {\n            return price > 0\n                ? ' <span class=\"option-price\" style=\"font-size:13px;color:#8a8a8a;font-weight:normal;\">(+$' + price.toFixed(2) + ')<\u002Fspan>'\n                : '';\n        }\n\n        function pgCard(onclickStr, active, name, price) {\n            return '<div class=\"option-card' + (active ? ' active' : '') + '\" onclick=\"' + onclickStr + '\">' +\n                   '<div class=\"custom-item-info\" style=\"display:flex;flex-direction:column;gap:4px;\">' +\n                   '<span class=\"option-name\" style=\"font-size:15px;font-weight:600;\">' + name + pgPriceTag(price) + '<\u002Fspan>' +\n                   '<\u002Fdiv><\u002Fdiv>';\n        }\n\n        function pgReqBadge(satisfied) {\n            if (satisfied) {\n                return '<span class=\"required-badge success\" style=\"font-weight:700;font-size:13px;\">' +\n                       '<svg style=\"width:14px;height:14px;margin-right:3px;margin-top:-2px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>' +\n                       'Selected<\u002Fspan>';\n            }\n            return '<span class=\"required-badge\" style=\"color:#b36b00;font-weight:700;font-size:13px;\">' +\n                   '<svg style=\"width:14px;height:14px;margin-right:2px;margin-top:-2px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>' +\n                   'Required<\u002Fspan>';\n        }\n\n        function pgRequiredBlock(title, satisfied, cardsHtml) {\n            return '<div class=\"custom-group-block\" style=\"border-bottom:none;margin-top:24px;padding-bottom:0;\">' +\n                   '<div class=\"custom-group-header\" style=\"margin-bottom:8px;\">' +\n                   '<div class=\"header-top-row\"><span class=\"custom-group-title\" style=\"font-size:18px;font-weight:700;color:#000;\">' + title + '<\u002Fspan><\u002Fdiv>' +\n                   '<div class=\"header-meta-row\">' + pgReqBadge(satisfied) +\n                   '<span class=\"meta-dot\" style=\"color:#000;font-weight:bold;\">&nbsp;&bull;&nbsp;<\u002Fspan>' +\n                   '<span class=\"custom-group-meta\" style=\"color:#000;font-size:13px;\">Select 1<\u002Fspan><\u002Fdiv>' +\n                   '<\u002Fdiv><div class=\"options-grid\">' + cardsHtml + '<\u002Fdiv><\u002Fdiv>';\n        }\n\n        function pgOptionalBlock(title, subtitle, cardsHtml) {\n            return '<div class=\"custo tton>';\n                    }).join('');\n                    const note = s.variationIndex === null ? 'Pick a pizza size first' : ('Matches your ' + sizeName + ' pizza');\n                    html += '<div class=\"custom-group-block\" style=\"border-bottom:none;margin-top:24px;padding-bottom:0;\">' +\n                            '<div style=\"background-color:#f1f4f1;border-radius:8px;padding:12px 16px;font-weight:700;font-size:16px;margin-bottom:12px;color:#191919;display:flex;justify-content:space-between;align-items:center;gap:12px;\">' +\n                            '<span>Drink Choice<\u002Fspan>' +\n                            '<div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-size:11px;color:#6b7280;font-weight:500;\">' + note + '<\u002Fspan><div class=\"size-tabs\">' + tabs + '<\u002Fdiv><\u002Fdiv>' +\n                            '<\u002Fdiv>' +\n                            '<div style=\"font-size:13px;color:#8a8a8a;margin-bottom:12px;margin-left:4px;\">(Optional) &bull; Drink size automatically follows your pizza size<\u002Fdiv>' +\n                            '<div class=\"options-grid\">' + cards + '<\u002Fdiv><\u002Fdiv>';\n                } else {\n                    html += pgOptionalBlock(fq.title, '(Optional) &bull; Select 1', cards);\n                }\n            });\n\n            // Modifiers (multi-select)\n            cfg.modifiers.forEach(function(mod) {\n                const selArr = s.modifiers[mod.id] || [];\n                const cards = mod.options.map(function(o) {\n                    const active = selArr.indexOf(o.name) >= 0;\n                    return pgCard(\"pgToggleModifier('\" + mod.id + \"','\" + o.name + \"')\", active, o.name, o.price);\n                }).join('');\n                const count = selArr.length;\n                const subtitle = '(Optional) &bull; ' + mod.subtitle + (count ? (' &bull; ' + count + ' selected') : '');\n                html += pgOptionalBlock(mod.title, subtitle, cards);\n            });\n\n            block.innerHTML = html;\n            window.updatePizzaGroupFooter();\n        };\n\n        window.pgSelectVariation = function(idx) {\n            window.pizzaGroupState.variationIndex = idx;\n            window.renderPizzaGroup();\n        };\n\n        window.pgClickSingle = function(fqId, idx) {\n            const fq = pizzaGroupConfig.fqs.find(function(f) { return f.id === fqId; });\n            const cur = window.pizzaGroupState.single[fqId];\n            if (cur === idx && fq && !fq.required) {\n                window.pizzaGroupState.single[fqId] = null;\n            } else {\n                window.pizzaGroupState.single[fqId] = idx;\n            }\n            window.renderPizzaGroup();\n        };\n\n        window.pgToggleModifier = function(modId, name) {\n            const arr = window.pizzaGroupState.modifiers[modId];\n            const i = arr.indexOf(name);\n            if (i >= 0) arr.splice(i, 1); else arr.push(name);\n            window.renderPizzaGroup();\n        };\n\n        window.computePizzaGroup = function() {\n            const s = window.pizzaGroupState;\n            const cfg = pizzaGroupConfig;\n            let total = activeProduct.price;\n            let parts = [];\n            let missing = 0;\n\n            if (s.variationIndex === null) {\n                missing++;\n            } else {\n                const v = cfg.variations[s.variationIndex];\n                total += v.price;\n                parts.push(v.name);\n            }\n\n            cfg.fqs.forEach(function(fq) {\n                const idx = s.single[fq.id];\n                if (idx === null || idx === undefined) {\n                    if (fq.required) missing++;\n                    return;\n                }\n                const opt = fq.options[idx];\n                total += opt.price;\n                if (fq.isDrink) {\n                    const sizeName = window.pgDrinkSizeName();\n                    total += cfg.drinkSizePrice[sizeName] || 0;\n                    parts.push(opt.name + ' (' + sizeName + ')');\n                } else {\n                    parts.push(opt.name);\n                }\n            });\n\n            cfg.modifiers.forEach(function(mod) {\n                (s.modifiers[mod.id] || []).forEach(function(nm) {\n                    const opt = mod.options.find(function(o) { return o.name === nm; });\n                    if (opt) { total += opt.price; parts.push(opt.name); }\n                });\n            });\n\n            return { total: total, parts: parts, missing: missing };\n        };\n\n        window.updatePizzaGroupFooter = function() {\n            const r = window.computePizzaGroup();\n            const btn = document.getElementById('modalActionBtn');\n            if (!btn) return;\n            if (r.missing > 0) {\n                btn.classList.add('disabled');\n                btn.disabled = true;\n                btn.innerHTML = '<span>Make ' + r.missing + ' Required Selection' + (r.missing > 1 ? 's' : '') + '<\u002Fspan> <span>$ ' + r.total.toFixed(2) + '<\u002Fspan>';\n            } else {\n                btn.classList.remove('disabled');\n                btn.disabled = false;\n                btn.innerHTML = '<span>Add to Order<\u002Fspan> <span>$ ' + r.total.toFixed(2) + '<\u002Fspan>';\n            }\n        };\n\n        window.addPizzaGroupToCart = function() {\n            const r = window.computePizzaGroup();\n            if (r.missing > 0) return;\n            const customizedProduct = Object.assign({}, activeProduct, {\n                displayName: activeProduct.name + ' - ' + r.parts.join(' | '),\n                finalPrice: r.total\n            });\n            cart.push(customizedProduct);\n            updateCartUI();\n            itemModal.style.display = 'none';\n        };\n\n        // Initialization\n        renderProducts();\n        updateCartUI();\n\n    <\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
